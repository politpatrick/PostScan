name: Build Releases

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ghostscript
        run: |
          choco install ghostscript -y
          echo "C:\Program Files\gs\gs10.03.1\bin" >> $env:GITHUB_PATH

      - name: Install Tesseract OCR
        run: |
          choco install tesseract -y
          echo "C:\Program Files\Tesseract-OCR" >> $env:GITHUB_PATH

      - name: Install Python dependencies
        run: pip install -r windows/requirements.txt

      - name: Build with PyInstaller
        run: pyinstaller windows/PostScan.spec

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" windows\installer.iss

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: PostScan-Windows
          path: windows/PostScan-Setup.exe

  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          brew install tesseract ghostscript poppler

      - name: Install Python dependencies
        run: pip install -r macos/requirements.txt

      - name: Build with PyInstaller
        run: pyinstaller macos/PostScan.spec

      - name: Create DMG
        run: |
          hdiutil create -volname PostScan -srcfolder dist/PostScan.app \
            -ov -format UDZO dist/PostScan.dmg

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: PostScan-macOS
          path: dist/PostScan.dmg

  package-scripts:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Erstelle Script-ZIP (Windows)
        run: |
          mkdir -p script_pkg_win
          cp main.py pipeline.py database.py config.py requirements.txt \
             setup-windows.bat start-windows.bat stammdaten_template.json icon.png \
             script_pkg_win/
          cd script_pkg_win && zip -r ../PostScan-Windows-Script.zip .

      - name: Erstelle Script-ZIP (macOS)
        run: |
          mkdir -p script_pkg_mac
          cp main.py pipeline.py database.py config.py requirements.txt \
             setup-macos.sh stammdaten_template.json icon.png \
             script_pkg_mac/
          cp "PostScan starten.command" script_pkg_mac/
          cd script_pkg_mac && zip -r ../PostScan-macOS-Script.zip .

      - name: Upload Windows Script ZIP
        uses: actions/upload-artifact@v4
        with:
          name: PostScan-Windows-Script
          path: PostScan-Windows-Script.zip

      - name: Upload macOS Script ZIP
        uses: actions/upload-artifact@v4
        with:
          name: PostScan-macOS-Script
          path: PostScan-macOS-Script.zip

  publish-release:
    needs: [build-windows, build-macos, package-scripts]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: PostScan-Windows

      - name: Download macOS DMG
        uses: actions/download-artifact@v4
        with:
          name: PostScan-macOS

      - name: Download Windows Script ZIP
        uses: actions/download-artifact@v4
        with:
          name: PostScan-Windows-Script

      - name: Download macOS Script ZIP
        uses: actions/download-artifact@v4
        with:
          name: PostScan-macOS-Script

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            PostScan-Setup.exe
            PostScan.dmg
            PostScan-Windows-Script.zip
            PostScan-macOS-Script.zip
          body: |
            ## PostScan

            ### Installer (empfohlen)
            - **Windows**: `PostScan-Setup.exe`
            - **macOS**: `PostScan.dmg`

            ### Skript-Variante (kein Installer, kein Antivirenproblem)
            - **Windows**: `PostScan-Windows-Script.zip` → entpacken → `setup-windows.bat` (einmalig) → `start-windows.bat`
            - **macOS**: `PostScan-macOS-Script.zip` → entpacken → `setup-macos.sh` (einmalig) → `PostScan starten.command`
          generate_release_notes: false
